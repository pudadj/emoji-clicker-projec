<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>😶 Clicker Ultimate - Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(160deg, #0b0817 0%, #13102b 40%, #1c1840 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            touch-action: manipulation;
            overflow-x: hidden;
        }
        .particles-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-5vh) scale(1.2); opacity: 0; }
        }
        .game-container {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 14px 16px;
            width: 100%;
            max-width: 420px;
            max-height: 95vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 60px rgba(140,100,255,0.12);
        }
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .skin-settings-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .skin-button,
        .settings-button {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            color: #fff;
        }
        .skin-button:active,
        .settings-button:active {
            background: rgba(255,215,0,0.2);
            transform: scale(0.9);
        }
        .prestige-bar {
            flex: 1;
            margin-left: 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            height: 36px;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.7rem;
            color: #fff;
        }
        .prestige-fill {
            height: 6px;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }
        .prestige-text {
            white-space: nowrap;
            font-weight: 600;
        }
        .prestige-btn {
            background: #ff8c00;
            border: none;
            border-radius: 14px;
            padding: 4px 10px;
            font-weight: 700;
            font-size: 0.7rem;
            color: #fff;
            cursor: pointer;
            margin-left: 4px;
            white-space: nowrap;
        }
        .prestige-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #555;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: rgba(20,20,45,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 0;
            width: 92%;
            max-width: 420px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            color: #fff;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 16px 10px;
            position: sticky;
            top: 0;
            background: rgba(20,20,45,0.95);
            backdrop-filter: blur(20px);
            z-index: 2;
            border-radius: 24px 24px 0 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .modal-close {
            background: rgba(255,255,255,0.1);
            border: none;
            color: rgba(255,255,255,0.8);
            font-size: 1.4rem;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 10px;
            transition: background 0.2s;
            line-height: 1;
        }
        .modal-close:active {
            background: rgba(255,255,255,0.25);
        }
        .modal-body {
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }
        .skin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .skin-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 14px 8px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }
        .skin-emoji-large {
            font-size: 2.5rem;
        }
        .skin-name {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .skin-multiplier {
            font-size: 0.75rem;
            color: #ffd700;
            font-weight: 600;
        }
        .skin-price {
            font-size: 0.7rem;
            color: #ffeaa7;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .skin-action-btn {
            border: none;
            border-radius: 12px;
            padding: 8px 14px;
            font-weight: 700;
            font-size: 0.8rem;
            color: #fff;
            cursor: pointer;
            margin-top: 4px;
            width: 100%;
            transition: transform 0.1s, filter 0.2s;
        }
        .skin-action-btn:active {
            transform: scale(0.92);
        }
        .skin-action-btn.buy {
            background: linear-gradient(135deg, #ffb347, #ff8c00);
        }
        .skin-action-btn.use {
            background: #2196F3;
        }
        .skin-action-btn.unequip {
            background: #f44336;
        }
        .skin-action-btn:disabled {
            background: #555;
            cursor: not-allowed;
            filter: grayscale(30%);
        }
        .skin-action-btn.equipped {
            background: #4caf50;
        }
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        @keyframes shake {
            0%,
            100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .confirm-dialog {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .confirm-dialog.active {
            opacity: 1;
            pointer-events: auto;
        }
        .confirm-box {
            background: rgba(30,30,60,0.95);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            color: #fff;
            max-width: 300px;
            width: 90%;
        }
        .confirm-box p {
            margin-bottom: 16px;
        }
        .confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .confirm-actions button {
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .confirm-yes {
            background: #4caf50;
            color: #fff;
        }
        .confirm-no {
            background: #f44336;
            color: #fff;
        }

        .score-section {
            text-align: center;
            width: 100%;
        }
        .score-label {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.45);
        }
        .score-value {
            font-size: 2.6rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 24px rgba(255,215,0,0.7);
            line-height: 1.1;
            transition: transform 0.2s;
            word-break: break-word;
        }
        .score-value.pulse {
            animation: scorePulse 0.35s ease;
        }
        @keyframes scorePulse {
            0%,
            100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .emoji-wrapper {
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.18) 0%, rgba(255,215,0,0.03) 55%, transparent 68%);
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        .emoji-wrapper:active {
            transform: scale(0.86);
        }
        .emoji-display {
            font-size: 80px;
            line-height: 1;
            pointer-events: none;
            filter: drop-shadow(0 6px 16px rgba(0,0,0,0.5));
        }
        .emoji-wrapper.pop .emoji-display {
            animation: emojiPop 0.28s ease;
        }
        @keyframes emojiPop {
            0% { transform: scale(0.6); }
            45% { transform: scale(1.25); }
            75% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .floating-text {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 1.3rem;
            color: #ffd700;
            text-shadow: 0 0 14px rgba(255,215,0,0.9);
            animation: floatAway 1.1s ease-out forwards;
            white-space: nowrap;
            z-index: 999;
        }
        @keyframes floatAway {
            0% { opacity:1; transform: translateY(0) scale(0.8); }
            25% { opacity:1; transform: translateY(-18px) scale(1.2); }
            100% { opacity:0; transform: translateY(-80px) scale(0.6); }
        }

        .stats-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        .stat-badge {
            background: rgba(255,255,255,0.06);
            border-radius: 18px;
            padding: 8px 12px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.85);
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            flex: 1 1 auto;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .stat-badge:active {
            background: rgba(255,255,255,0.12);
        }
        .stat-badge.active-tab {
            background: rgba(255,215,0,0.15);
            border-color: rgba(255,215,0,0.4);
            box-shadow: 0 0 12px rgba(255,215,0,0.2);
        }
        .stat-value {
            color: #ffd700;
            font-weight: 700;
        }
        .stat-badge .toggle-icon {
            font-size: 0.65rem;
            opacity: 0.8;
        }

        .upgrades-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .upgrade-category {
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            padding: 10px 10px 14px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .upgrade-category.hidden {
            display: none;
        }
        .category-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        @media (max-width: 350px) {
            .items-grid {
                grid-template-columns: 1fr;
            }
        }
        .item-btn {
            background: linear-gradient(135deg, rgba(255,160,0,0.18), rgba(255,120,0,0.12));
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 12px 10px;
            color: #fff;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-align: center;
            min-height: 70px;
            touch-action: manipulation;
        }
        .item-btn:active:not(:disabled) {
            transform: scale(0.95);
            background: linear-gradient(135deg, rgba(255,210,0,0.35), rgba(255,150,0,0.25));
        }
        .item-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(30%);
        }
        .item-bonus {
            font-size: 1rem;
            font-weight: 800;
            color: #ffd700;
        }
        .item-price {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.35);
            padding: 4px 10px;
            border-radius: 14px;
            color: #ffeaa7;
        }
        .item-owned {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.6);
        }

        .settings-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .settings-modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .settings-content {
            background: rgba(20,20,45,0.95);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 90%;
            max-width: 350px;
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 26px;
            background: #555;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle-switch.active {
            background: #4caf50;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        .toggle-switch.active::after {
            transform: translateX(22px);
        }
    </style>
</head>

                <span class="modal-title">🎨 Shop Skin</span>

                <div class="skin-grid" id="skinGrid"></div>

            </div>
        </div>
    </div>
